version: 1
name: layer-parity-spot-check
description: |
  Spot-check the relationship between Layer 3 (installed in etcd) and
  Layer 4 (running in systemd) for a set of critical services.

  The 4-layer model guarantees these layers are INDEPENDENT — a service
  can be installed (Layer 3) but not running (Layer 4), or running but
  not recorded as installed.

  Lab topology exception (quickstart.topology_lab_only_exception):
  In the quickstart lab, services are pre-installed in the Docker container
  image rather than deployed through the Globular package management system.
  As a result, Layer 3 (etcd package records under /globular/nodes/<id>/packages/)
  is structurally EMPTY even though Layer 4 (systemd) is fully active.
  Layer 3 assertions are therefore skipped in this scenario; they are only
  meaningful in clusters that have run a full package deployment cycle.

  What IS verified here:
    - Layer 4 (systemd active) for node-agent on all 5 nodes
    - Layer 2 (service registry) for dns — registered in etcd
    - Layer 4 (systemd active) for dns on node-3 (post-SIGKILL recovery)
    - Cluster health stable post-chaos

  This is a post-resilience parity check — verifies that the chaos
  scenarios (crash, node restart) left Layer 4 runtime state intact.

suite: recovery
tags:
  - layer3
  - layer4
  - parity
  - post-resilience
  - spot-check

cluster:
  profile: quickstart-5node
  require_healthy_before_start: false
  reset_before: false
  reset_after: false

preconditions:
  - type: probe
    id: cluster_reachable
    probe: cluster.health
    expect:
      status: healthy

assertions:
  # ── Layer 3 NOTE ───────────────────────────────────────────────────────────
  # node.installed_packages assertions are OMITTED here.
  # In the quickstart lab, packages are pre-installed in the Docker image and
  # not deployed through the Globular package system, so etcd package records
  # are empty. See: quickstart.topology_lab_only_exception in the description.
  # Layer 3 assertions require a full Globular package deployment cycle.

  # ── node-agent: Layer 4 active on all nodes ────────────────────────────────
  - type: probe
    id: node_agent_active_node1
    probe: service.status
    params:
      node: node-1
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: node_agent_active_node2
    probe: service.status
    params:
      node: node-2
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: node_agent_active_node3
    probe: service.status
    params:
      node: node-3
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: node_agent_active_node4
    probe: service.status
    params:
      node: node-4
      service: node-agent
    expect:
      unit_state: active   # rejoined after resilience test

  - type: probe
    id: node_agent_active_node5
    probe: service.status
    params:
      node: node-5
      service: node-agent
    expect:
      unit_state: active   # rejoined after resilience test

  # ── dns: Layer 4 active on node-3 (the node that was SIGKILL'd) ───────────
  - type: probe
    id: dns_active_after_resilience
    probe: service.status
    params:
      node: node-3
      service: dns
    expect:
      unit_state: active

  # ── dns: still registered in etcd (Layer 2 / service registry) ────────────
  - type: probe
    id: dns_registered_post_chaos
    probe: service.registered
    params:
      service: dns
    expect:
      registered: true

  # ── cluster-wide service count stable post-chaos ───────────────────────────
  - type: probe
    id: service_count_stable
    probe: cluster.health
    expect:
      status: healthy

awareness:
  enabled: true
  task: "verify Repository Desired Installed Runtime layer parity in quickstart"
  phase: "reconcile"
  include_runtime: true
  expected_invariants:
    - runtime.installed_state_not_liveness

cleanup: []
