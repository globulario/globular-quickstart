version: 1
name: node-agent-uptime
description: |
  Verify that all 5 node-agents remain active throughout a ~4 minute
  observation window without operator intervention.

  The node-agent is the executor for all cluster operations — if it
  crashes and fails to restart, the node becomes unmanageable. This
  scenario samples all 5 nodes at 3 time points to verify:
    - All node-agents are in "active" systemd state throughout
    - No node-agent crash-loops during idle operation
    - The installed package count (Layer 3) remains stable

  This tests the "quiet" stability of the cluster: no chaos, no load,
  just time passing. If a node-agent exits during idle operation it
  indicates a memory leak, keepalive failure, or bad systemd unit config.

  All 5 nodes are checked because founding nodes (1-3) and worker
  nodes (4-5) have different service footprints and different risk profiles.

suite: soak
tags:
  - stability
  - node-agent
  - layer4
  - soak

cluster:
  profile: quickstart-5node
  require_healthy_before_start: false
  reset_before: false
  reset_after: false

preconditions:
  - type: probe
    id: node1_agent_before
    probe: service.status
    params:
      node: node-1
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: node4_agent_before
    probe: service.status
    params:
      node: node-4
      service: node-agent
    expect:
      unit_state: active

baseline:
  - type: probe
    id: baseline_packages
    probe: cluster.installed_packages

steps:
  # ── sample T=0 ────────────────────────────────────────────────────────────
  - id: t0_node1
    probe: service.status
    params:
      node: node-1
      service: node-agent
    expect:
      unit_state: active

  - id: t0_node2
    probe: service.status
    params:
      node: node-2
      service: node-agent
    expect:
      unit_state: active

  - id: t0_node3
    probe: service.status
    params:
      node: node-3
      service: node-agent
    expect:
      unit_state: active

  - id: t0_node4
    probe: service.status
    params:
      node: node-4
      service: node-agent
    expect:
      unit_state: active

  - id: t0_node5
    probe: service.status
    params:
      node: node-5
      service: node-agent
    expect:
      unit_state: active

  # ── wait 120s ─────────────────────────────────────────────────────────────
  - id: wait_mid
    action: wait
    params:
      timeout: 120

  # ── sample T=120s ─────────────────────────────────────────────────────────
  - id: t120_node1
    probe: service.status
    params:
      node: node-1
      service: node-agent
    expect:
      unit_state: active

  - id: t120_node2
    probe: service.status
    params:
      node: node-2
      service: node-agent
    expect:
      unit_state: active

  - id: t120_node3
    probe: service.status
    params:
      node: node-3
      service: node-agent
    expect:
      unit_state: active

  - id: t120_node4
    probe: service.status
    params:
      node: node-4
      service: node-agent
    expect:
      unit_state: active

  - id: t120_node5
    probe: service.status
    params:
      node: node-5
      service: node-agent
    expect:
      unit_state: active

  # ── wait 120s ─────────────────────────────────────────────────────────────
  - id: wait_final
    action: wait
    params:
      timeout: 120

  # ── sample T=240s ─────────────────────────────────────────────────────────
  - id: t240_node1
    probe: service.status
    params:
      node: node-1
      service: node-agent
    expect:
      unit_state: active

  - id: t240_node2
    probe: service.status
    params:
      node: node-2
      service: node-agent
    expect:
      unit_state: active

  - id: t240_node3
    probe: service.status
    params:
      node: node-3
      service: node-agent
    expect:
      unit_state: active

  - id: t240_node4
    probe: service.status
    params:
      node: node-4
      service: node-agent
    expect:
      unit_state: active

  - id: t240_node5
    probe: service.status
    params:
      node: node-5
      service: node-agent
    expect:
      unit_state: active

assertions:
  # Final check: all 5 agents still active, Layer 3 untouched
  - type: probe
    id: final_node1_active
    probe: service.status
    params:
      node: node-1
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: final_node2_active
    probe: service.status
    params:
      node: node-2
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: final_node3_active
    probe: service.status
    params:
      node: node-3
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: final_node4_active
    probe: service.status
    params:
      node: node-4
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: final_node5_active
    probe: service.status
    params:
      node: node-5
      service: node-agent
    expect:
      unit_state: active

  - type: probe
    id: layer3_unchanged
    probe: cluster.installed_packages
    expect:
      total_gte: 50   # no packages vanished from Layer 3

cleanup: []
