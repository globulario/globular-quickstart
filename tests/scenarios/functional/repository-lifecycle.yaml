version: 1
name: repository-lifecycle
description: |
  Verify the Repository service is operational and artifacts are present in etcd.

  The Repository is the Layer 1 source of truth: "does this version exist?"
  Without it, the controller cannot build desired state (Layer 2), node agents
  cannot install (Layer 3), and nothing can run (Layer 4).

  Checks:
    1. Repository service registered in etcd
    2. Repository systemd unit is active on node-1
    3. Service release records exist in etcd (/globular/resources/ServiceRelease/)
    4. Desired state entries exist in etcd (/globular/resources/DesiredService/)

  Deep artifact integrity (entrypoint_checksum, lifecycle state transitions)
  is tested in the security/integrity suite.

suite: functional
tags:
  - repository
  - artifacts
  - desired-state
  - 4-layer-model

cluster:
  profile: quickstart-5node
  require_healthy_before_start: true
  reset_before: false
  reset_after: false

preconditions:
  - type: probe
    id: cluster_healthy
    probe: cluster.health
    expect:
      status: healthy

  - type: probe
    id: repository_registered
    probe: service.registered
    params:
      service: repository
    expect:
      registered: true

baseline:
  - type: probe
    id: baseline_desired_state
    probe: cluster.desired_state
    # Capture for evidence

# ── wait for desired state and controller to fully converge ───────────────────
steps:
  - id: wait_desired_state_populated
    action: wait
    params:
      timeout: 180
      poll_interval: 15
      until:
        probe: cluster.desired_state
        expect:
          count_gte: 1


# ── assert repository layer is functional ────────────────────────────────────
assertions:
  - type: probe
    id: repository_service_registered
    probe: service.registered
    params:
      service: repository
    expect:
      registered: true

  # Repository runs on the storage-profile node (not always node-1).
  # Use etcd registration as the functional proof — unit state depends on node assignment.
  - type: probe
    id: repository_in_service_matrix
    probe: cluster.service_matrix
    expect:
      count_gte: 15

  - type: probe
    id: desired_state_populated
    probe: cluster.desired_state
    expect:
      count_gte: 1

  # Controller is the Layer 2 authority — must be registered and processing desired state.
  # Note: controller unit may stay in "activating" if sd_notify is gated behind
  # MinIO availability. Use etcd registration as the functional proof.
  - type: probe
    id: controller_registered
    probe: service.registered
    params:
      service: cluster_controller
    expect:
      registered: true

artifacts:
  collect:
    - type: logs
      node: node-1
      service: repository
    - type: logs
      node: node-1
      service: cluster-controller

cleanup:
  - type: probe
    id: final_desired_state
    probe: cluster.desired_state
